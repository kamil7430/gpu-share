services:
  testing-subject:
    build:
      context: ../..
      dockerfile: docker/test/Dockerfile
    env_file:
      - ../../.env.example
    ports:
      - "2137:2137"
      - "2138:2138"
      - "2139:2139"
    depends_on:
      db:
        condition: service_healthy
    networks:
      network:
        ipv4_address: ${BACKEND_IP}
  db:
    image: postgres
    restart: always
    volumes:
      - db-data:/var/lib/postgresql
    env_file:
      - ../../.env.example
    expose:
      - 5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      network:
        ipv4_address: ${DB_IP}

volumes:
  db-data:

networks:
  network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
          gateway: 10.5.0.1
