services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file: ../.env
    ports:
      - "2137:2137"
    depends_on:
      db:
        condition: service_healthy
    networks:
      network:
        ipv4_address: ${BACKEND_IP}
  gpu:
    build:
      context: ..
      dockerfile: docker/gpu.Dockerfile
    env_file: ../.env
    ports:
      - "2138:2138"
      - "2139:2139"
    networks:
      network:
        ipv4_address: ${GPU_IP}
  db:
    image: postgres
    restart: always
    env_file: ../.env
    volumes:
      - db-data:/var/lib/postgresql
    expose:
      - 5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      network:
        ipv4_address: ${DB_IP}

volumes:
  db-data:

networks:
  network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET_ADDRESS}
          gateway: ${GATEWAY_IP}
