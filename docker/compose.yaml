services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../backend/.env
    ports:
      - "2137:2137"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres
    restart: always
    volumes:
      - db-data:/var/lib/postgresql
    env_file:
      - ../backend/.env
    expose:
      - 5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  db-data:
