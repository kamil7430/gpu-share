type: object
required:
  - deviceId
  - name
  - gpuModel
  - vramMb
  - cudaCores
  - pricePerHourUsd
  - driverVersion
  - state
properties:
  deviceId:
    type: string
  name:
    type: string
  gpuModel:
    type: string
  vramMb:
    type: integer
    minimum: 0
  cudaCores:
    type: integer
    minimum: 0
  pricePerHourUsd:
    type: string
  driverVersion:
    type: string
  state:
    $ref: "./State.yaml"