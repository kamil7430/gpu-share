type: object
required:
  - deviceId
  - name
  - gpuModel
  - vramMb
  - cudaCores
  - pricePerHourUsd
  - driverVersion
  - state
properties:
  deviceId:
    type: string
  name:
    type: string
  gpuModel:
    type: string
  vramMb:
    type: integer
    minimum: 0
  cudaCores:
    type: integer
    minimum: 0
  pricePerHourUsd:
    type: string
    example: "0.45"
  driverVersion:
    type: string
    description: Driver version expressed as the major version followed by a period and a minor version
    example: "535.104"
  state:
    $ref: "./State.yaml"