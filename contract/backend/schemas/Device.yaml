type: object
required:
  - deviceId
  - name
  - gpuModel
  - vramMb
  - cudaCores
  - pricePerHourUsdCents
  - driverVersion
  - state
properties:
  deviceId:
    type: string
  name:
    type: string
  gpuModel:
    type: string
  vramMb:
    type: integer
    minimum: 0
  cudaCores:
    type: integer
    minimum: 0
  pricePerHourUsdCents:
    type: integer
    minimum: 0
    description: Price per active usage hour in USD cents, for example a value of `45` means `0.45 USD/h`
    example: 45
  driverVersion:
    type: string
    description: Driver version expressed as the major version followed by a period and a minor version
    example: "535.104"
  state:
    $ref: "./State.yaml"
