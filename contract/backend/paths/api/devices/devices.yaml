get:
  summary: Get list of devices that match the provided filters
  operationId: getDevices
  parameters:
    - $ref: "../../../parameters/query/limit.yaml"
    - name: name
      in: query
      required: false
      description: Name of devices to retrieve
      schema:
        type: string
    - name: gpuModel
      in: query
      required: false
      description: Model of device to retrieve
      schema:
        type: string
    - name: minVramMb
      in: query
      required: false
      description: Minimum amount of Video RAM in megabytes
      schema:
        type: integer
        minimum: 0
    - name: maxVramMb
      in: query
      required: false
      description: Maximum amount of Video RAM in megabytes
      schema:
        type: integer
        minimum: 0
    - name: minCudaCores
      in: query
      required: false
      description: Minimum amount of CUDA cores
      schema:
        type: integer
        minimum: 0
    - name: maxCudaCores
      in: query
      required: false
      description: Maximum amount of CUDA cores
      schema:
        type: integer
        minimum: 0
    - name: minPricePerHourUsdCents
      in: query
      required: false
      description: Minimum price per hour of device usage in USD cents
      examples:
        fifteen:
          summary: 15.99 USD/h
          value: 1599
      schema:
        type: integer
        minimum: 0
    - name: maxPricePerHourUsdCents
      in: query
      required: false
      description: Maximum price per hour of device usage in USD cents
      examples:
        fifteen:
          summary: 15.99 USD/h
          value: 1599
      schema:
        type: integer
        minimum: 0
    - name: minDriverVersion
      in: query
      required: false
      description: Minimum driver version
      example: "595.97"
      schema:
        type: string
    - name: maxDriverVersion
      in: query
      required: false
      description: Maximum driver version
      example: "595.97"
      schema:
        type: string
    - name: states
      in: query
      required: false
      description: Device states
      schema:
        type: array
        items:
          $ref: "../../../schemas/State.yaml"
        minItems: 1
  responses:
    "200":
      description: Any device found
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../schemas/Device.yaml"
    "404":
      description: No devices found
    "400":
      description: Invalid filter parameters
    default:
      $ref: "../../../responses/default.yaml"

post:
  summary: Register a device. The device is assigned to the owner that's currently logged in
  operationId: addDevice
  security:
    - bearerAuth:
        - user
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - gpuModel
            - vramMb
            - cudaCores
            - pricePerHourUsdCents
            - driverVersion
          properties:
            name:
              type: string
            gpuModel:
              type: string
            vramMb:
              type: integer
              minimum: 0
            cudaCores:
              type: integer
              minimum: 0
            pricePerHourUsdCents:
              type: integer
              minimum: 0
              description: Price per active usage hour in USD cents, for example a value of `45` means `0.45 USD/h`
              example: 45
            driverVersion:
              type: string
              description: Driver version expressed as the major version followed by a period and a minor version
              example: "535.104"
  responses:
    "201":
      description: Device created
      content:
        application/json:
          schema:
            type: object
            required:
              - deviceId
              - ownerUsername
              - state
              - createdAt
            properties:
              deviceId:
                type: string
              ownerUsername:
                type: string
              state:
                $ref: "../../../schemas/State.yaml"
              createdAt:
                type: string
                format: date-time
    "400":
      description: Invalid device parameters
    "401":
      description: The client is not logged in
    default:
      $ref: "../../../responses/default.yaml"