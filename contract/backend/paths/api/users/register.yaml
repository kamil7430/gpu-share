post:
  summary: Register a user
  operationId: register
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - username
            - password
          properties:
            username:
              type: string
            password:
              type: string
  responses:
    "201":
      description: The user created
      content:
        application/json:
          schema:
            $ref: "../../../schemas/AuthToken.yaml"
    "400":
      description: Invalid username or password
      content:
        application/json:
          schema:
            type: string
    "409":
      description: Username exists
    default:
      $ref: "../../../responses/default.yaml"