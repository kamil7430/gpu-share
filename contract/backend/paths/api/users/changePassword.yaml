post:
  summary: Change current logged in user's password
  operationId: changePassword
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - oldPassword
            - newPassword
          properties:
            oldPassword:
              type: string
            newPassword:
              type: string
  responses:
    "200":
      description: The password was changed
    "400":
      description: Invalid new password
    "401":
      description: Invalid old password
    default:
      $ref: "../../../responses/default.yaml"