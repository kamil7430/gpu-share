<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>API Documentation</title>

  <style>
    :root {
      --bg-color: #282828;
      --text-color: #ebdbb2;

      --red: #fb4934;
      --green: #b8bb26;
      --yellow: #fabd2f;
      --blue: #83a598;
      --purple: #d3869b;
      --aqua: #8ec07c;
      --gray: #928374;

      /* Gruvbox Dark Hard */
      --bg-color-h: #1d2021;
      --text-color-h: #fbf1c7;

      --red-h: #cc241d;
      --green-h: #98971a;
      --yellow-h: #d79921;
      --blue-h: #458588;
      --purple-h: #b16286;
      --aqua-h: #689d6a;
      --gray-h: #7c6f64;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-color-h);
      color: var(--text-color-h);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
      color: var(--yellow);
    }

    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    a {
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      background: var(--bg-color);
      color: var(--blue);
      font-size: 18px;
      border: 1px solid var(--gray-h);
      transition: all 0.2s ease;
    }

    a:hover {
      background: var(--bg-color-h);
      color: var(--aqua);
      border-color: var(--aqua-h);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>REST API Documentation</h1>
    <div class="links">
      <a href="./backend.html">Backend</a>
      <a href="./gpu.html">GPU Coordinator</a>
    </div>
  </div>
</body>
</html>
